# Streamlit server configuration.
#
# These defaults suit both local runs and hosted deployment (Streamlit
# Community Cloud, or a container). Community Cloud manages the port/address
# itself; the settings here mainly matter when you run the container or serve
# it yourself.

[server]
# Bind on all interfaces so the app is reachable from other machines
# (e.g. over the LAN, or from a container's published port).
address = "0.0.0.0"
port = 8502
# No interactive prompts / usage-stats email when starting headless.
headless = true

[theme]
# The app is designed for a light palette only; lock it so charts and page
# chrome always match. Charts are additionally forced to light in ui/theme.py.
base = "light"

[browser]
# Advertise a friendly local hostname instead of "localhost". Streamlit prints
# this (and opens it) as the app URL, so you get http://home-tco.local:8502.
# Requires a matching hosts-file entry pointing home-tco.local at 127.0.0.1
# (see README "Run locally"); the server itself still binds 0.0.0.0:8502.
serverAddress = "home-tco.local"
# Don't collect usage statistics.
gatherUsageStats = false
